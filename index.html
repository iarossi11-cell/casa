<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard House Control</title>
    <style>
        :root {
            --primary: #4361ee;
            --success: #4cc9f0;
            --danger: #f72585;
            --bg: #f8f9fa;
            --card: #ffffff;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .container { max-width: 600px; margin: auto; }
        
        /* Header & Casais */
        .header { text-align: center; margin-bottom: 25px; }
        .pair-card { 
            background: linear-gradient(135deg, var(--primary), #3a0ca3); 
            color: white; padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.3);
            text-align: center; margin-bottom: 25px;
        }
        .pair-name { font-size: 1.4em; font-weight: bold; display: block; margin: 10px 0; }
        .btn-switch { 
            background: rgba(255,255,255,0.2); border: 1px solid white; 
            color: white; padding: 8px 15px; border-radius: 30px; cursor: pointer;
            transition: 0.3s;
        }

        /* Seções de Cartões */
        .card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; display: flex; align-items: center; gap: 10px; font-size: 1.1em; color: var(--primary); }

        /* Lixo Customizado */
        .lixo-container { display: flex; justify-content: space-between; gap: 10px; }
        .lixo-btn { 
            flex: 1; border: none; padding: 15px 5px; border-radius: 12px; 
            font-weight: bold; cursor: pointer; transition: 0.3s; opacity: 0.4;
        }
        .lixo-btn.active { opacity: 1; transform: scale(1.05); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .l-vazio { background: #d1fae5; color: #065f
