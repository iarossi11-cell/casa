<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart House Dashboard</title>
    <style>
        :root {
            --primary: #4361ee;
            --bg: #f0f2f5;
            --card: #ffffff;
            --text: #1f2937;
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); }
        .container { max-width: 500px; margin: auto; }
        
        /* Tela de Login Simples para Privacidade */
        #login-screen { text-align: center; padding-top: 50px; }
        .login-box { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        input[type="password"] { width: 80%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 10px; text-align: center; }
        
        /* Dashboard Principal */
        #main-dashboard { display: none; }
        
        .header-card { 
            background: linear-gradient(135deg, #4361ee, #7209b7); 
            color: white; padding: 25px; border-radius: 24px; 
            text-align: center; margin-bottom: 20px; box-shadow: 0 8px 16px rgba(67, 97, 238, 0.2);
        }
        
        .pair-display { font-size: 1.5rem; font-weight: 800; margin: 10px 0; display: block; }
        
        .card { background: var(--card); border-radius: 18px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.03); }
        h3 { margin: 0 0 15px 0; font-size: 1.1rem; display: flex; align-items: center; gap: 8px; color: var(--primary); }

        /* Botões de Lixo */
        .lixo-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .btn-l { border: none; padding: 12px 5px; border-radius: 12px; font-weight: 600; cursor: pointer; transition: 0.3s; opacity: 0.5; }
        .btn-l.active { opacity: 1; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); border: 2px solid #333; }
        .vazio { background: #dcfce7; color: #166534; }
        .medio { background: #fef9c3; color: #854d0e; }
        .cheio { background: #fee2e2; color: #991b1b; }

        /* Checklist */
        .task { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
        input[type="checkbox"] { width: 20px; height: 20px; margin-right: 12px; accent-color: var(--primary); }

        /* Notas e Compras */
        textarea { width: 100%; border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; box-sizing: border-box; font-family: inherit; font-size: 0.95rem; }
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; margin-top: 10px; font-weight: bold; cursor: pointer; }

        .btn-switch { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 6px 12px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-screen">
        <div class="login-box">
            <h2>🏠 Casa Privada</h2>
            <p>Digite a senha da galera:</p>
            <input type="password" id="passInput" placeholder="Senha">
            <button class="btn-save" onclick="checkPass()">Entrar</button>
        </div>
    </div>

    <div id="main-dashboard">
        <div class="header-card">
            <span style="font-size: 0.9rem; opacity: 0.9;">RESPONSÁVEIS DA SEMANA</span>
            <span id="displayPair" class="pair-display">Leonardo & Natália</span>
            <button class="btn-switch" onclick="togglePair()">🔄 Alternar Casal</button>
        </div>

        <div class="card">
            <h3>🗑️ Status do Lixo</h3>
            <div class="lixo-grid">
                <button id="lb1" class="btn-l vazio active" onclick="setLixo(1, 'Vazio')">Vazio</button>
                <button id="lb2" class="btn-l medio" onclick="setLixo(2, 'Médio')">Médio</button>
                <button id="lb3" class="btn-l cheio" onclick="setLixo(3, 'CHEIO')">Cheio</button>
            </div>
        </div>

        <div class="card">
            <h3>🧼 Faxina Semanal</h3>
            <label class="task"><input type="checkbox"> Geladeira (Limpar e Vencidos)</label>
            <label class="task"><input type="checkbox"> Micro-ondas (Prato e Interno)</label>
            <label class="task"><input type="checkbox"> Eletros (Pó e Gordura)</label>
            <label class="task"><input type="checkbox"> Chão (Aspirar e Passar Pano)</label>
            <label class="task"><input type="checkbox"> Organizar Lavanderia</label>
        </div>

        <div class="card">
            <h3>📝 Mural de Compras / Notas</h3>
            <textarea id="obsArea" rows="4" placeholder="Ex: Comprar detergente..."></textarea>
            <button class="btn-save" onclick="saveObs()">Salvar no Mural</button>
        </div>
    </div>
</div>

<script>
    const pairs = ["Leonardo & Natália", "Gustavo & Giulia"];
    let currentIdx = 0;

    // A senha padrão é 1234 - Mude aqui se quiser
    function checkPass() {
        const pass = document.getElementById('passInput').value;
        if(pass === "1234") { 
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'block';
            loadData();
        } else {
            alert("Senha incorreta!");
        }
    }

    function togglePair() {
        currentIdx = (currentIdx + 1) % pairs.length;
        updateUI();
        localStorage.setItem('casa_pair', currentIdx);
    }

    function setLixo(id, status) {
        document.querySelectorAll('.btn-l').forEach(b => b.classList.remove('active'));
        document.getElementById('lb' + id).classList.add('active');
        if(status === 'CHEIO') alert('🚨 Atenção ' + pairs[currentIdx] + ': Lixo cheio!');
    }

    function saveObs() {
        const text = document.getElementById('obsArea').value;
        localStorage.setItem('casa_obs', text);
        alert('✅ Mural atualizado!');
    }

    function loadData() {
        const savedObs = localStorage.getItem('casa_obs');
        if(savedObs) document.getElementById('obsArea').value = savedObs;
        
        const savedPair = localStorage.getItem('casa_pair');
        if(savedPair) {
            currentIdx = parseInt(savedPair);
            updateUI();
        }
    }

    function updateUI() {
        document.getElementById('displayPair').innerText = pairs[currentIdx];
    }
</script>

</body>
</html>
